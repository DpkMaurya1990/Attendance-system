name: Deploy to Hugging Face

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set HF Space based on branch
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/dev" ]]; then
            echo "SPACE=Attendance-system-dev" >> $GITHUB_ENV
          else
            echo "SPACE=Attendance-system" >> $GITHUB_ENV
          fi

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deepak.mau2@gmail.com"
          git config --global user.name "github-actions"

          git clone https://user:$HF_TOKEN@huggingface.co/spaces/dpkmaurya2025/$SPACE repo

          rsync -av --delete \
            --exclude '.git' \
            --exclude '__pycache__' \
            ./ repo/ || true

          cd repo
          git add .
          git commit -m "Auto deploy from GitHub ($SPACE)" || echo "No changes"
          git push